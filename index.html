<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AdPulse AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #020617; color: white; font-family: sans-serif; }
        .card { background: #0f172a; border: 1px solid #1e293b; padding: 20px; border-radius: 20px; }
    </style>
</head>
<body class="p-6">
    <div class="max-w-5xl mx-auto">
        <div class="flex justify-between items-center mb-10">
            <div>
                <h1 class="text-3xl font-black text-blue-500">AdPulse AI</h1>
                <p class="text-slate-500">Live Dashboard Ready ✅</p>
            </div>
            <div class="bg-blue-600 px-6 py-2 rounded-xl font-bold">Connected</div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
            <div class="card">
                <p class="text-slate-500 text-xs font-bold uppercase mb-2">Total Spend</p>
                <h2 class="text-3xl font-black">$14,280</h2>
            </div>
            <div class="card border-blue-500/50">
                <p class="text-slate-500 text-xs font-bold uppercase mb-2">Total ROAS</p>
                <h2 class="text-3xl font-black text-blue-400">2.44x</h2>
            </div>
            <div class="card">
                <p class="text-slate-500 text-xs font-bold uppercase mb-2">Revenue</p>
                <h2 class="text-3xl font-black text-green-400">$34,844</h2>
            </div>
        </div>

        <div class="bg-blue-600/10 border border-blue-600/20 p-8 rounded-[32px] text-center">
            <h3 class="text-xl font-bold mb-2">مبروك يا محمد! الموقع فتح خلاص</h3>
            <p class="text-slate-400">كده إحنا اتأكدنا إن الاستضافة شغالة. الكود ده HTML صافي عشان ميهنجش.</p>
        </div>
    </div>
</body>
</html>
