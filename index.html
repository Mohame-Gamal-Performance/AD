<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AdPulse AI - Dashboard</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/recharts/umd/Recharts.js"></script>
    <style>
        body { background-color: #020617; color: white; font-family: sans-serif; margin: 0; }
        .loader { border: 4px solid #1e293b; border-top: 4px solid #3b82f6; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="root">
        <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh;">
            <div class="loader"></div>
            <p style="color: #64748b;">جاري تشغيل محرك AdPulse AI...</p>
        </div>
    </div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const { AreaChart, Area, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer } = Recharts;

        const App = () => {
            const data = [
                { name: 'Mon', spend: 1200, rev: 2800 },
                { name: 'Tue', spend: 1500, rev: 3200 },
                { name: 'Wed', spend: 1100, rev: 2900 },
                { name: 'Thu', spend: 1900, rev: 4500 },
                { name: 'Fri', spend: 2200, rev: 5100 },
            ];

            return (
                <div className="min-h-screen bg-slate-950 p-4 md:p-8">
                    <div className="max-w-6xl mx-auto">
                        <header className="flex justify-between items-center mb-10">
                            <div>
                                <h1 className="text-3xl font-black text-blue-500 italic">AD-PULSE</h1>
                                <p className="text-slate-500 text-sm font-bold">AI PERFORMANCE DASHBOARD</p>
                            </div>
                            <div className="bg-green-500/10 text-green-500 border border-green-500/20 px-4 py-1 rounded-full text-xs font-bold animate-pulse">
                                ● LIVE SYSTEM
                            </div>
                        </header>

                        <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                            <div className="bg-slate-900 border border-slate-800 p-6 rounded-3xl">
                                <p className="text-slate-500 text-xs font-bold uppercase">Total Spend</p>
                                <p className="text-3xl font-black text-white">$14,280</p>
                            </div>
                            <div className="bg-slate-900 border border-slate-800 p-6 rounded-3xl">
                                <p className="text-slate-500 text-xs font-bold uppercase text-blue-400">Current ROAS</p>
                                <p className="text-3xl font-black text-blue-400">2.44x</p>
                            </div>
                            <div className="bg-slate-900 border border-slate-800 p-6 rounded-3xl">
                                <p className="text-slate-500 text-xs font-bold uppercase text-green-500">Net Revenue</p>
                                <p className="text-3xl font-black text-green-500">$34,844</p>
                            </div>
                        </div>

                        <div className="bg-slate-900/50 border border-slate-800 p-8 rounded-[40px]">
                            <h3 className="text-xl font-bold mb-6">Revenue Growth</h3>
                            <div className="h-64 w-full">
                                <ResponsiveContainer width="100%" height="100%">
                                    <AreaChart data={data}>
                                        <CartesianGrid strokeDasharray="3 3" stroke="#1e293b" vertical={false} />
                                        <XAxis dataKey="name" stroke="#475569" fontSize={12} />
                                        <YAxis stroke="#475569" fontSize={12} />
                                        <Tooltip contentStyle={{backgroundColor: '#0f172a', border: 'none', borderRadius: '12px'}} />
                                        <Area type="monotone" dataKey="rev" stroke="#2563eb" strokeWidth={4} fill="#2563eb20" />
                                    </AreaChart>
                                </ResponsiveContainer>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
