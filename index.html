<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AdPulse AI - Full Dashboard</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/recharts/umd/Recharts.js"></script>
    <script src="https://unpkg.com/lucide-react"></script>
    <style>
        body { margin: 0; padding: 0; background: #020617; font-family: sans-serif; overflow-x: hidden; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const { LineChart, Line, BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, AreaChart, Area } = Recharts;

        // الأيقونات
        const Icon = ({ name, color = "currentColor", size = 20 }) => {
            const LucideIcon = lucide[name];
            return LucideIcon ? <LucideIcon color={color} size={size} /> : null;
        };

        const App = () => {
            // كودك الأصلي وتصميمك الكامل
            return (
                <div className="min-h-screen bg-[#020617] text-slate-200 flex">
                    {/* Sidebar */}
                    <div className="w-64 border-r border-slate-800 bg-[#020617] p-6 hidden md:block">
                        <div className="flex items-center gap-3 mb-10">
                            <div className="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center font-bold text-white">A</div>
                            <span className="text-xl font-extrabold tracking-tight text-white">AdPulse AI</span>
                        </div>
                        <nav className="space-y-2">
                            {['Dashboard', 'Creative Hub', 'AI Insights', 'Audience', 'Alerts'].map((item, i) => (
                                <div key={i} className={`p-3 rounded-xl cursor-pointer transition ${i===0 ? 'bg-blue-600/10 text-blue-400 border border-blue-600/20' : 'hover:bg-slate-900 text-slate-500'}`}>
                                    {item}
                                </div>
                            ))}
                        </nav>
                    </div>

                    {/* Main Content */}
                    <div className="flex-1 overflow-y-auto h-screen p-8">
                        <header className="flex justify-between items-center mb-10">
                            <div>
                                <h1 className="text-2xl font-bold text-white uppercase tracking-wider">Performance Overview</h1>
                                <p className="text-slate-500 text-sm">Real-time data from Meta Ads API</p>
                            </div>
                            <div className="flex gap-3">
                                <div className="bg-slate-900 border border-slate-800 px-4 py-2 rounded-xl text-sm">Last 7 Days</div>
                                <div className="bg-blue-600 px-4 py-2 rounded-xl text-sm font-bold text-white shadow-lg shadow-blue-600/20">Sync Data</div>
                            </div>
                        </header>

                        {/* KPI Cards */}
                        <div className="grid grid-cols-1 md:grid-cols-4 gap-6 mb-10">
                            {[
                                {label: 'Total Spend', value: '$14,280', change: '+12%', color: 'text-white'},
                                {label: 'ROAS', value: '2.44x', change: '-2%', color: 'text-blue-400'},
                                {label: 'Net Revenue', value: '$34,844', change: '+8%', color: 'text-green-400'},
                                {label: 'CPA', value: '$18.40', change: '-5%', color: 'text-white'}
                            ].map((kpi, i) => (
                                <div key={i} className="bg-slate-900/50 border border-slate-800 p-6 rounded-3xl hover:border-slate-700 transition">
                                    <div className="text-slate-500 text-xs font-bold uppercase mb-2">{kpi.label}</div>
                                    <div className={`text-3xl font-black ${kpi.color}`}>{kpi.value}</div>
                                    <div className={`text-xs mt-2 ${kpi.change.startsWith('+') ? 'text-green-500' : 'text-red-500'}`}>{kpi.change} vs last period</div>
                                </div>
                            ))}
                        </div>

                        {/* Chart Area */}
                        <div className="bg-slate-900/50 border border-slate-800 p-8 rounded-3xl mb-10">
                            <div className="flex justify-between items-center mb-8">
                                <h3 className="font-bold text-lg">Revenue vs Spend</h3>
                                <div className="flex gap-4 text-xs">
                                    <span className="flex items-center gap-2"><div className="w-3 h-3 bg-blue-600 rounded-full"></div> Revenue</span>
                                    <span className="flex items-center gap-2"><div className="w-3 h-3 bg-slate-600 rounded-full"></div> Spend</span>
                                </div>
                            </div>
                            <div className="h-64">
                                <ResponsiveContainer width="100%" height="100%">
                                    <AreaChart data={[
                                        {n: 'Mon', s: 1200, r: 2400}, {n: 'Tue', s: 1500, r: 3100}, 
                                        {n: 'Wed', s: 1100, r: 2800}, {n: 'Thu', s: 1800, r: 4200},
                                        {n: 'Fri', s: 2000, r: 4800}, {n: 'Sat', s: 1600, r: 3900}, {n: 'Sun', s: 1400, r: 3400}
                                    ]}>
                                        <defs>
                                            <linearGradient id="colorR" x1="0" y1="0" x2="0" y2="1">
                                                <stop offset="5%" stopColor="#2563eb" stopOpacity={0.3}/>
                                                <stop offset="95%" stopColor="#2563eb" stopOpacity={0}/>
                                            </linearGradient>
                                        </defs>
                                        <CartesianGrid strokeDasharray="3 3" stroke="#1e293b" vertical={false} />
                                        <XAxis dataKey="n" stroke="#64748b" fontSize={12} tickLine={false} axisLine={false} />
                                        <YAxis stroke="#64748b" fontSize={12} tickLine={false} axisLine={false} />
                                        <Tooltip contentStyle={{background: '#0f172a', border: '1px solid #1e293b', borderRadius: '12px'}} />
                                        <Area type="monotone" dataKey="r" stroke="#2563eb" strokeWidth={3} fillOpacity={1} fill="url(#colorR)" />
                                        <Area type="monotone" dataKey="s" stroke="#475569" strokeWidth={2} fill="transparent" />
                                    </AreaChart>
                                </ResponsiveContainer>
                            </div>
                        </div>

                        {/* AI Insight Box */}
                        <div className="bg-gradient-to-r from-blue-900/40 to-indigo-900/40 border border-blue-500/30 p-8 rounded-3xl flex items-center justify-between">
                            <div className="max-w-xl">
                                <div className="flex items-center gap-2 mb-2">
                                    <div className="w-2 h-2 bg-blue-400 rounded-full animate-pulse"></div>
                                    <span className="text-blue-400 text-xs font-bold uppercase tracking-widest">AI Recommendation</span>
                                </div>
                                <h4 className="text-xl font-bold text-white mb-2">Creative Fatigue Detected in Campaign "Q4 Prospecting"</h4>
                                <p className="text-slate-300 text-sm leading-relaxed">
                                    Your "Video_v3" ad has seen a 24% drop in CTR over 48h. We suggest swapping it with "UGC_Static_v1" to maintain 2.5x ROAS.
                                </p>
                            </div>
                            <button className="bg-white text-blue-900 px-6 py-3 rounded-2xl font-bold text-sm hover:scale-105 transition">Apply Fix</button>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
